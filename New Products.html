<title>Filter</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="filter-header" id="filterBtn">
    <span>☰ Filters</span>
    <span id="arrow">▼</span>
</div>

<div class="filter-panel" id="filterPanel">

    <h3>Availability</h3>

    <label>
        <input type="checkbox" id="available">
        Available
    </label>

    <p id="status">Status : All Products</p>

    <h3>Price</h3>

    <input type="range"
           id="priceRange"
           min="0"
           max="30000"
           value="30000">

    <p>₹0 - ₹<span id="priceValue">30000</span></p>
</div>


<div class="top-bar">
 <i class="fa-solid fa-filter"></i>
        
    </div>

    <div class="sort-box">

        <label>⬚⬚↕</label>
               
        <select id="sortProducts">

            <option value="recommended">Recommended</option>
            <option value="high">Price: High To Low</option>
            <option value="low">Price: Low To High</option>
            <option value="new">Newest First</option>
            <option value="old">Oldest First</option>

        </select>

    </div>

</div>


<hr class="full-line2">


</div>
