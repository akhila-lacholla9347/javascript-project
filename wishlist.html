<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Wishlist</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <style>
        *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f5f5f5;
    padding:40px;
}

.wishlist-title{
    text-align:center;
    color:#e31837;
    font-size:45px;
    margin-bottom:50px;
}

#wishlistContainer{

    display:grid;

    grid-template-columns:repeat(auto-fill,minmax(320px,1fr));

    gap:35px;

    max-width:1500px;

    margin:auto;

}

.wishlist-card{

    background:white;

    border-radius:20px;

    overflow:hidden;

    box-shadow:0 8px 20px rgba(0,0,0,.1);

    transition:.3s;

    padding:20px;

    text-align:center;

}

.wishlist-card:hover{

    transform:translateY(-8px);

    box-shadow:0 15px 30px rgba(0,0,0,.18);

}

.wishlist-card img{

    width:230px;

    height:230px;

    object-fit:contain;

    display:block;

    margin:auto;

}

.wishlist-card h2{

    font-size:25px;

    margin-top:20px;

    color:#222;

    min-height:65px;

}

.price{

    font-size:28px;

    color:#e31837;

    font-weight:bold;

    margin:18px 0;

}

.remove-btn{

    width:180px;

    height:48px;

    border:none;

    border-radius:30px;

    background:#e31837;

    color:white;

    font-size:18px;

    cursor:pointer;

    transition:.3s;

}

.remove-btn:hover{

    background:#b00020;

}

.empty{

    text-align:center;

    font-size:35px;

    color:gray;

    margin-top:100px;

}



        </style>

<!--<h1 style="text-align:center;">My Wishlist ❤️</h1>

<div id="wishlistContainer"></div>-->
<h1 class="wishlist-title">My Wishlist ❤️</h1>

<div id="wishlistContainer"></div>

<script src="wishlist.js"></script>

</body>
</html>
