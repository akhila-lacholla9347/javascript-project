<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details</title>

    <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="fin.css">


</head>

<body>
    <style>

.button-group{
    margin-top:30px;
    display:flex;
    gap:20px;
}

#cartBtn{
    padding:15px 35px;
    border:none;
    background:white;
    color:#d6001c;
    border:2px solid #d6001c;
    border-radius:30px;
    font-size:18px;
    cursor:pointer;
}

#buyBtn{
    padding:15px 35px;
    border:none;
    background:#d6001c;
    color:white;
    border-radius:30px;
    font-size:18px;
    cursor:pointer;
}

#cartBtn:hover{
    background:#d6001c;
    color:white;
}

#buyBtn:hover{
    background:#b00018;
}

#wishlistBtn{
    padding:15px 30px;
    border:2px solid #d6001c;
    background:white;
    color:#d6001c;
    border-radius:30px;
    cursor:pointer;
    font-size:18px;
    margin-bottom:20px;
}

#wishlistBtn:hover{
    background:#d6001c;
    color:white;
}

        </style>

    <div class="product-details">

        <div class="left">

            <img id="productImage">

        </div>

        <div class="right">

            <h1 id="productName"></h1>

            <h3 id="productSubtitle"></h3>

            <h2 id="productPrice"></h2>

            <p>
                <del id="productMrp"></del>
                <span id="productDiscount"></span>
            </p>

            <div id="productRating"></div>

            <h3>Features</h3>

            <ul id="productFeatures"></ul>

            <br>

<button id="wishlistBtn">❤️ Add to Wishlist</button>



            <div class="button-group">
           <button id="cartBtn">Add to Cart</button>
        <button id="buyBtn">Buy Now</button>
</div>

        </div>

    </div>

<script src="productdetails.js"></script>

</body>
</html>
